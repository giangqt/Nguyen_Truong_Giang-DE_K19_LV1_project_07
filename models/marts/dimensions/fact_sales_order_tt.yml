version: 2

models:
  - name: fact_sales_order_tt
    description: Fact table for sales order line items

    columns:
      - name: sk_fact_sales
        tests:
          - unique
          - not_null

      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: quantity
        tests:
          - not_null
